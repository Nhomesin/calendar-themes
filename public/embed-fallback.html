<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book an appointment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ct-primary:  #6C63FF;
      --ct-bg:       #FFFFFF;
      --ct-text:     #1A1A1A;
    }

    html, body {
      height: 100%;
      background: var(--ct-bg);
      font-family: system-ui, sans-serif;
      color: var(--ct-text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .brand-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
    }

    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ct-primary);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--ct-text);
      opacity: .7;
    }

    .calendar-frame-wrap {
      width: 100%;
      flex: 1;
      overflow: hidden;
      background: var(--ct-bg);
      position: relative;
      min-height: 600px;
    }

    #cal-iframe {
      width: 100%;
      min-height: 600px;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity .3s;
    }

    #cal-iframe.loaded { opacity: 1; }

    .loading-ring {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: opacity .3s;
    }

    .loading-ring.hidden { opacity: 0; }

    .ring {
      width: 32px; height: 32px;
      border: 3px solid color-mix(in srgb, var(--ct-primary) 20%, transparent);
      border-top-color: var(--ct-primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      gap: 12px;
      min-height: 300px;
    }

    .error-state.show { display: flex; }

    .error-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--ct-primary) 12%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .error-title { font-size: 15px; font-weight: 600; }
    .error-msg   { font-size: 13px; opacity: .6; max-width: 320px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="page">
  <div class="brand-bar">
    <div class="brand-dot"></div>
    <span class="brand-name" id="brand-name">Loading...</span>
  </div>

  <div class="calendar-frame-wrap">
    <div class="loading-ring" id="loading-ring">
      <div class="ring"></div>
    </div>

    <div class="error-state" id="error-state">
      <div class="error-icon">!</div>
      <div class="error-title">Calendar unavailable</div>
      <div class="error-msg" id="error-msg">This booking link may be invalid or the calendar has been removed.</div>
    </div>

    <iframe id="cal-iframe" src="" scrolling="yes" allow="payment" title="Book an appointment"></iframe>
  </div>
</div>

<script>
  /* SERVER_VARS_PLACEHOLDER */

  const params     = new URLSearchParams(location.search);
  const calendarId = (typeof SERVER_CALENDAR_ID !== 'undefined' ? SERVER_CALENDAR_ID : null)
                     || params.get('calendarId') || '';
  const locationId = (typeof SERVER_LOCATION_ID !== 'undefined' ? SERVER_LOCATION_ID : null)
                     || params.get('locationId') || '';
  const bookingName = (typeof SERVER_NAME !== 'undefined' ? SERVER_NAME : null)
                     || params.get('name') || 'Book an appointment';

  const iframe    = document.getElementById('cal-iframe');
  const ring      = document.getElementById('loading-ring');
  const errState  = document.getElementById('error-state');
  const brandName = document.getElementById('brand-name');

  if (!calendarId) {
    showError('No calendar specified in this link.');
  } else {
    iframe.src = `https://api.leadconnectorhq.com/widget/booking/${calendarId}`;
    brandName.textContent = bookingName;

    iframe.addEventListener('load', () => {
      iframe.classList.add('loaded');
      ring.classList.add('hidden');
    });

    setTimeout(() => {
      iframe.classList.add('loaded');
      ring.classList.add('hidden');
    }, 8000);

    window.addEventListener('message', (e) => {
      if (e.data && typeof e.data === 'object') {
        const h = e.data.height || e.data.SET_HEIGHT;
        if (h && h > 200) iframe.style.minHeight = h + 'px';
      }
      if (typeof e.data === 'string' && !isNaN(parseInt(e.data))) {
        const h = parseInt(e.data);
        if (h > 200) iframe.style.minHeight = h + 'px';
      }
    });
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    errState.classList.add('show');
    ring.classList.add('hidden');
    brandName.textContent = 'Unavailable';
  }
</script>

</body>
</html>
