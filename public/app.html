<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalTheme Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/builder.css">
  <link rel="stylesheet" href="/css/embed-preview.css">
</head>
<body>

<div class="shell" style="position:relative">

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
  </div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="3" width="12" height="10" rx="2" stroke="white" stroke-width="1.5"/>
          <path d="M4 1V4M10 1V4M1 6H13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="4" y="8" width="2" height="2" rx=".5" fill="white"/>
          <rect x="8" y="8" width="2" height="2" rx=".5" fill="white"/>
        </svg>
      </div>
      <span class="app-name">CalTheme</span>
      <span class="loc-pill" id="loc-display">loading...</span>
    </div>
    <div class="topbar-right">
      <button class="save-btn" id="save-btn">
        <span id="save-label">Save theme</span>
      </button>
    </div>
  </header>

  <!-- Theme List (Left) -->
  <aside class="theme-list">
    <div class="theme-list-header">
      <div class="section-label">Themes</div>
      <button class="new-theme-btn" id="new-theme-btn">+ New theme</button>
    </div>
    <div class="theme-list-items" id="theme-list-items">
      <!-- Populated by builder-app.js -->
    </div>
  </aside>

  <!-- Editor (Middle) -->
  <div class="editor">
    <div class="editor-tabs" id="editor-tabs">
      <!-- Populated by builder-app.js -->
    </div>
    <div class="editor-body" id="editor-body">
      <!-- Populated by builder-app.js -->
    </div>
  </div>

  <!-- Preview (Right) -->
  <main class="preview">
    <div class="preview-toolbar">
      <span class="preview-label">Preview</span>
      <div id="preview-tabs" class="preview-tabs">
        <!-- Populated by builder-app.js -->
      </div>
    </div>
    <div class="preview-body" id="preview-body">
      <!-- Populated by builder-app.js -->
    </div>
  </main>

</div>

<div class="toast" id="toast"></div>

<script src="/js/calendar-renderer.js"></script>
<script src="/js/builder-app.js"></script>

<!-- Tell GHL parent frame our height so the iframe resizes -->
<script>
(function() {
  function postHeight() {
    var h = document.documentElement.scrollHeight;
    window.parent.postMessage({ type: 'resize', height: h }, '*');
    // GHL also listens for this format
    window.parent.postMessage(JSON.stringify({ action: 'setHeight', height: h }), '*');
  }
  // Post on load, after fonts render, and on any resize
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  // Periodic check for dynamic content changes
  setInterval(postHeight, 1000);
})();
</script>

</body>
</html>
