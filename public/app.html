<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalTheme Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/builder.css">
  <link rel="stylesheet" href="/css/embed-preview.css">
</head>
<body>

<div class="shell" id="shell">

  <div class="loading-overlay" id="loading">
    <div class="loading-inner">
      <div class="spinner"></div>
      <span class="loading-text">Loading builder...</span>
    </div>
  </div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="4" width="14" height="12" rx="3" stroke="white" stroke-width="1.6"/>
          <path d="M5 2V5M13 2V5M2 8H16" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="7" cy="12" r="1.2" fill="white"/>
          <circle cx="11" cy="12" r="1.2" fill="white"/>
        </svg>
      </div>
      <span class="app-name">CalTheme</span>
      <span class="topbar-divider"></span>
      <span class="loc-pill" id="loc-display">loading...</span>
    </div>
    <div class="topbar-right">
      <button class="save-btn" id="save-btn">
        <svg class="save-icon" viewBox="0 0 16 16" fill="none"><path d="M2 2v12h12V5l-3-3H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><path d="M5 2v4h5V2" stroke="currentColor" stroke-width="1.2"/><rect x="4" y="9" width="8" height="4" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
        <span id="save-label">Save</span>
      </button>
    </div>
  </header>

  <!-- Theme List (Left) -->
  <aside class="theme-list">
    <div class="theme-list-header">
      <span class="panel-title">Themes</span>
      <button class="new-theme-btn" id="new-theme-btn">
        <svg viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        New
      </button>
    </div>
    <div class="theme-list-items" id="theme-list-items">
      <!-- Populated by builder-app.js -->
    </div>
  </aside>

  <!-- Editor (Middle) -->
  <div class="editor">
    <div class="editor-tabs" id="editor-tabs">
      <!-- Populated by builder-app.js -->
    </div>
    <div class="editor-body" id="editor-body">
      <!-- Populated by builder-app.js -->
    </div>
  </div>

  <!-- Preview (Right) -->
  <main class="preview">
    <div class="preview-toolbar">
      <span class="panel-title">Preview</span>
      <div id="preview-tabs" class="preview-tabs">
        <!-- Populated by builder-app.js -->
      </div>
    </div>
    <div class="preview-body" id="preview-body">
      <!-- Populated by builder-app.js -->
    </div>
  </main>

</div>

<div class="toast" id="toast">
  <svg class="toast-icon" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.3"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span class="toast-msg"></span>
</div>

<script src="/js/calendar-renderer.js"></script>
<script src="/js/builder-app.js"></script>

<script>
(function() {
  function postHeight() {
    var h = document.body.scrollHeight;
    window.parent.postMessage({ type: 'resize', height: h }, '*');
    window.parent.postMessage(JSON.stringify({ action: 'setHeight', height: h }), '*');
  }
  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  new MutationObserver(postHeight).observe(document.body, { childList: true, subtree: true, attributes: true });
})();
</script>

</body>
</html>
